<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Menú - Burguer House</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-TF5LKFXGJZ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-TF5LKFXGJZ');
</script>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#ffffff;
color:rgb(10, 10, 10);
padding-bottom:90px;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
background:rgba(20,20,20,.9);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:1000;
border-bottom:1px solid rgba(255,255,255,.05);
}

.logo{
font-size:26px;
font-weight:800;
color:#ff9800;
}

/* CART */
.cart{
position:fixed;
top:20px;
right:20px;
background:#ff9800;
color:black;
padding:12px 15px;
border-radius:50px;
font-weight:800;
cursor:pointer;
z-index:999;
}

/* TITLE */
.title{
text-align:center;
padding:20px;
}

.title h1{
font-size:32px;
}
.title span{color:#ff9800;}

/* MENU DESKTOP */
.menu{
padding:40px 8%;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
}

/* CARD */
.card{
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
border-radius:18px;
overflow:hidden;
transition:.3s;
display:flex;
flex-direction:column;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
cursor:pointer;
}

.card-body{
padding:12px;
flex:1;
}

.card h3{
font-size:18px;
}

.card p{
font-size:13px;
color:#aaa;
margin:5px 0;
}

.price{
color:#ff9800;
font-weight:700;
margin-top:5px;
}

/* BOTÓN */
.add-btn{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#ff9800;
font-weight:800;
cursor:pointer;
margin-top:10px;
transition:.2s;
}

.add-btn:hover{
transform:scale(1.03);
}

/* MOBILE */
@media(max-width:768px){

.menu{padding:15px;}

.cards{
display:flex;
flex-direction:column;
gap:12px;
}

.card{
flex-direction:row;
align-items:center;
padding:10px;
gap:12px;
border-radius:15px;
}

.card img{
width:75px;
height:75px;
border-radius:12px;
}

.card-body{
flex:1;
padding:0;
}

.card h3{font-size:15px;}
.card p{font-size:12px;}
.price{font-size:14px;}

.add-btn{
width:42px;
height:42px;
min-width:42px;
padding:0;
border-radius:12px;
font-size:22px;
display:flex;
align-items:center;
justify-content:center;
margin-top:0;
}
}

/* NAV */
.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:#ffffff;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid rgba(255,255,255,.08);
z-index:999;
}

.nav-item{
background:none;
border:none;
color:#aaa;
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
gap:4px;
cursor:pointer;
}

.nav-item i{font-size:18px;}
.nav-item.active{color:#ff9800;}

.icon-wrapper{position:relative;}

.cart-badge{
position:absolute;
top:-6px;
right:-10px;
background:#ff9800;
color:black;
font-size:10px;
padding:2px 6px;
border-radius:50px;
font-weight:700;
}

/* LIGHTBOX */
.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.92);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
padding:20px;
}

.lightbox img{
max-width:95%;
max-height:90%;
border-radius:12px;
}
/* ================= HERO COMPLETO SIN RECORTE ================= */
.hero-title{
position:relative;
width:100%;
height:220px;
background:#ffffff;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
margin-top:10px;
}

.hero-title img{
max-width:100%;
max-height:100%;
object-fit:contain;
display:block;
}

/* TEXTO ENCIMA */
.hero-text{
position:absolute;
text-align:center;
}

.hero-text h1{
font-size:34px;
font-weight:800;
color:#ffffff;
text-shadow:0 4px 20px rgba(0,0,0,.8);
}

.hero-text span{
color:#ff9800;
}

/* MOBILE */
@media(max-width:768px){
.hero-title{
height:170px;
}

.hero-text h1{
font-size:24px;
}
}


/* HEADER */
header{
display:flex;
justify-content:center;
align-items:center;
padding:18px 8%;
background:rgba(255, 253, 253, 0.9);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:1000;
border-bottom:1px solid rgba(255,255,255,.05);
text-align:center;
}
.logo{
font-size:28px;
font-weight:800;
color:#ff9800;
}

nav{
display:flex;
gap:30px;
}

nav a{
color:#bbb;
text-decoration:none;
font-weight:500;
transition:.3s;
}

nav a:hover{
color:#ff9800;
}

</style>
</head>

<body>

<header>
<div class="logo">🍔 Mochi Burguers</div>
</header>

<div class="cart">
🛒 <span id="count">0</span>
</div>
<div class="hero-title">
  <img src="43.jpeg" alt="Menú Burger House">

  <div class="hero-text">
    <h1>Nuestro <span>Menú</span></h1>
  </div>
</div>
</div>
<section class="menu">
<div class="cards" id="menu"></div>
</section>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox" onclick="cerrarLightbox()">
  <img id="lightboxImg" src="">
</div>
<!-- ================= MENÚ DE BANDEJAS ================= -->
<section class="menu">
  <div class="title">
    <h1>Menú de <span>Bandejas</span></h1>
  </div>

  <div class="cards" id="bandejas"></div>
</section>

<!-- ================= MENÚ DE BEBIDAS ================= -->
<section class="menu">
  <div class="title">
    <h1>Menú de <span>Bebidas</span></h1>
  </div>

  <div class="cards" id="bebidas"></div>
</section>
<nav class="bottom-nav">

<button class="nav-item" onclick="location.href='index.html'">
<i class="fa-solid fa-house"></i>
<span>Inicio</span>
</button>

<button class="nav-item active" onclick="location.href='menu.html'">
<i class="fa-solid fa-burger"></i>
<span>Menú</span>
</button>

<button class="nav-item" onclick="location.href='pedidos.htm'">
<div class="icon-wrapper">
<i class="fa-solid fa-box"></i>
<span class="cart-badge" id="cartCount">0</span>
</div>
<span>Pedidos</span>
</button>

<button class="nav-item" onclick="location.href='promos.htm'">
<i class="fa-solid fa-tags"></i>
<span>Promos</span>
</button>

</nav><script>const productos = [

{
nombre:"Doner",
precio:150,
desc:"Doners (pan pita, lechuga, tomate, salsas de la casa, Pollo o Res acompañado de papas fritas)",
img:"4.jpeg",
extras:[
{nombre:"Papas",precio:35},
{nombre:"Gaseosa",precio:25}
]
},
{
nombre:"Alitas",
precio:200,
desc:"Descripcion: Alitas (BBQ, Búfalo, mango habanero, ranch todas acompañadas con papas fritas)",
img:"5.jpeg",
extras:[
{nombre:"Mango Habanero",precio:35},
{nombre:"Salsa Ranch",precio:25},
{nombre:"Mostaza y Miel ",precio:25}
]
},
{
nombre:"Sandwich de Pescado",
precio:300,
desc:"Sándwich de pescado ( filete de pescado, ensalada de cole, salsa casera papas fritas)",
img:"6.jpeg",
extras:[
{nombre:"Papas",precio:35},
{nombre:"Gaseosa",precio:25}
]
},


{
nombre:"Sandwich de Pollo",
precio:100,
desc:"Sándwich de pollo hot (filete de pollo empanizado reahogado en salsa picante de la casa, pepinillo, aderezo casero, papas fritas)",
img:"7.jpeg",
extras:[
{nombre:"Papas",precio:35},
{nombre:"Gaseosa",precio:25}
]
},


];

/* ================= BANDEJAS ================= */
const bandejas = [
{nombre:"Bandeja Expres",precio:550,desc:"Incluye Bebidas",img:"17.jpe"},
];

/* ================= BEBIDAS ================= */
const bebidas = [
{nombre:"Coca-Cola de la pequeña",precio:25,desc:"Coca-Cola",img:"34.jpeg"},
];

/* ================= CARRITO ================= */
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

/* ================= ESTADO ================= */
let productoSeleccionado = null;
let extrasSeleccionados = {};

/* ================= RENDER MENÚ ================= */
function render(){
let html = "";

productos.forEach((p,i)=>{
let extrasPreview = "";

if(p.extras?.length){
extrasPreview = `
<div style="font-size:12px;color:#aaa;margin-top:4px;">
Agregar Extras: ${p.extras.map(e=>e.nombre).join(", ")}
</div>`;
}

html += `
<div class="card">

<img src="${p.img}" onclick="abrirLightbox('${p.img}')">

<div class="card-body">
<h3>${p.nombre}</h3>
${extrasPreview}
<p>${p.desc}</p>
<div class="price">C$${p.precio}</div>
</div>

<button class="add-btn" onclick="abrirExtras(${i})">
${window.innerWidth<=768?"+":"Agregar"}
</button>

</div>`;
});

document.getElementById("menu").innerHTML = html;
}

/* ================= BANDEJAS ================= */
function renderBandejas(){
let html = "";

bandejas.forEach((p,i)=>{
html += `
<div class="card">

<img src="${p.img}" onclick="abrirLightbox('${p.img}')">

<div class="card-body">
<h3>${p.nombre}</h3>
<p>${p.desc}</p>
<div class="price">C$${p.precio}</div>
</div>

<button class="add-btn" onclick="agregarBandeja(${i})">
${window.innerWidth<=768?"+":"Agregar"}
</button>

</div>`;
});

document.getElementById("bandejas").innerHTML = html;
}

/* ================= BEBIDAS ================= */
function renderBebidas(){
let html = "";

bebidas.forEach((p,i)=>{
html += `
<div class="card">

<img src="${p.img}" onclick="abrirLightbox('${p.img}')">

<div class="card-body">
<h3>${p.nombre}</h3>
<p>${p.desc}</p>
<div class="price">C$${p.precio}</div>
</div>

<button class="add-btn" onclick="agregarBebida(${i})">
${window.innerWidth<=768?"+":"Agregar"}
</button>

</div>`;
});

document.getElementById("bebidas").innerHTML = html;
}

function agregarBebida(i){
let p = bebidas[i];

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

let index = carrito.findIndex(x=>x.nombre===p.nombre);

if(index!==-1){
carrito[index].qty++;
}else{
carrito.push({
nombre:p.nombre,
precio:p.precio,
desc:p.desc,
img:p.img,
qty:1,
extras:[]
});
}

localStorage.setItem("carrito",JSON.stringify(carrito));

update();
mostrarToast("✔ Bebida agregada");
}

/* ================= EXTRAS ================= */
function abrirExtras(i){
productoSeleccionado = productos[i];
extrasSeleccionados = {};

let extrasHTML = "";

if(productoSeleccionado.extras?.length){
productoSeleccionado.extras.forEach((e,idx)=>{
extrasHTML += `
<div style="display:flex;justify-content:space-between;align-items:center;margin:10px 0;border-bottom:1px solid #222;padding:6px 0;">

<label style="display:flex;align-items:center;gap:8px;">
<input type="checkbox" onchange="toggleExtra(${idx})">
<span>${e.nombre}</span>
</label>

<span style="color:#ff9800;font-weight:bold">+C$${e.precio}</span>

</div>`;
});
}else{
extrasHTML = `<p style="color:#aaa">Sin extras</p>`;
}

let box = document.createElement("div");
box.id="extrasBox";
box.style = `position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:9999;`;

box.innerHTML = `
<div style="background:#111;padding:20px;border-radius:15px;width:320px;color:#fff">

<h3>${productoSeleccionado.nombre}</h3>

${extrasHTML}

<button onclick="confirmarExtra()" style="width:100%;padding:12px;background:#ff9800;border:none;font-weight:800;border-radius:10px;">Agregar</button>

<button onclick="cerrarExtras()" style="width:100%;margin-top:10px;padding:10px;background:#333;border:none;color:#fff;border-radius:10px;">Cerrar</button>

</div>`;

document.body.appendChild(box);
}

/* ================= CARRITO ================= */
function confirmarExtra(){

let extraTotal = 0;
let extrasFinal = [];

for(let k in extrasSeleccionados){
extraTotal += extrasSeleccionados[k];
extrasFinal.push({nombre:k,precio:extrasSeleccionados[k]});
}

let total = productoSeleccionado.precio + extraTotal;

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

carrito.push({
nombre:productoSeleccionado.nombre,
precio:total,
desc:productoSeleccionado.desc,
img:productoSeleccionado.img,
qty:1,
extras:extrasFinal
});

localStorage.setItem("carrito",JSON.stringify(carrito));

cerrarExtras();
update();
mostrarToast("✔ Agregado");
}

function cerrarExtras(){
let b=document.getElementById("extrasBox");
if(b) b.remove();
}

function toggleExtra(i){
let e = productoSeleccionado.extras[i];

if(extrasSeleccionados[e.nombre]){
delete extrasSeleccionados[e.nombre];
}else{
extrasSeleccionados[e.nombre]=e.precio;
}
}

/* ================= BANDEJAS ================= */
function agregarBandeja(i){
let p = bandejas[i];

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

let index = carrito.findIndex(x=>x.nombre===p.nombre);

if(index!==-1){
carrito[index].qty++;
}else{
carrito.push({
nombre:p.nombre,
precio:p.precio,
desc:p.desc,
img:p.img,
qty:1,
extras:[]
});
}

localStorage.setItem("carrito",JSON.stringify(carrito));

update();
mostrarToast("✔ Bandeja agregada");
}

/* ================= UPDATE ================= */
function update(){
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

let total=0;
carrito.forEach(p=>total+=p.qty);

document.getElementById("count").innerText=total;

let nav=document.getElementById("cartCount");
if(nav) nav.innerText=total;
}

/* ================= TOAST ================= */
function mostrarToast(msg){
let t=document.createElement("div");
t.innerText=msg;
t.style=`position:fixed;bottom:20px;right:20px;background:#ff9800;color:#000;padding:10px 14px;border-radius:10px;font-weight:bold;z-index:9999;`;
document.body.appendChild(t);
setTimeout(()=>t.remove(),1500);
}

/* ================= LIGHTBOX ================= */
function abrirLightbox(img){
document.getElementById("lightboxImg").src=img;
document.getElementById("lightbox").style.display="flex";
}

function cerrarLightbox(){
document.getElementById("lightbox").style.display="none";
document.getElementById("lightboxImg").src="";
}

/* ================= INIT ================= */
render();
renderBandejas();
renderBebidas();
update();
</script>
</body>
</html>
