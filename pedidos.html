<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pedidos</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-TF5LKFXGJZ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-TF5LKFXGJZ');
</script>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', sans-serif;
}

body{
background: radial-gradient(circle at top, #151515, #0b0b0b);
color:white;
}

/* ===== APP ===== */
.app{
display:grid;
grid-template-columns:1.7fr 1fr;
min-height:100vh;
}

/* ===== LEFT ===== */
.left{
padding:30px;
}

.header{
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
gap:10px;
margin-bottom:25px;
text-align:center;
}
.clear{
align-self:center;
}

.header h1{
font-size:28px;
}

.clear{
background:linear-gradient(135deg,#ff3b3b,#ff6b6b);
border:none;
padding:10px 16px;
border-radius:12px;
color:white;
cursor:pointer;
font-weight:600;
}

/* LIST */
.list{
display:flex;
flex-direction:column;
gap:14px;
}

/* ITEM */
.item{
display:flex;
align-items:center;
justify-content:space-between;
background:linear-gradient(145deg,#151515,#101010);
padding:15px;
border-radius:16px;
border:1px solid #222;
}

.item img{
width:75px;
height:75px;
border-radius:12px;
object-fit:cover;
}

.info{
flex:1;
margin-left:15px;
}

.name{
font-size:17px;
font-weight:600;
}

.price{
color:#ffb347;
margin-top:5px;
}

/* CONTROLES */
.controls{
display:flex;
align-items:center;
gap:10px;
}

.qty{
display:flex;
border:1px solid #ff9800;
border-radius:12px;
overflow:hidden;
background:#0f0f0f;
}

.qty button{
width:34px;
height:34px;
background:none;
border:none;
color:#ff9800;
font-size:18px;
cursor:pointer;
}

.qty span{
width:34px;
text-align:center;
line-height:34px;
}

.del{
background:#ff3b3b;
border:none;
color:white;
padding:8px 10px;
border-radius:12px;
cursor:pointer;
}

/* ===== RIGHT ===== */
.right{
background:#111;
padding:25px;
border-left:1px solid #222;
display:flex;
flex-direction:column;
gap:18px;
}

/* BOX */
.box{
background:#151515;
padding:15px;
border-radius:14px;
border:1px solid #222;
}

.title{
color:#ff9800;
margin-bottom:10px;
font-size:16px;
}

/* OPTIONS */
.option{
display:flex;
justify-content:space-between;
padding:12px;
border-radius:10px;
cursor:pointer;
margin-bottom:8px;
background:#101010;
}

.option.active{
border:1px solid #ff9800;
}

/* PAY */
.payments{
display:flex;
gap:8px;
}

.pay{
flex:1;
padding:10px;
text-align:center;
border:1px solid #333;
border-radius:10px;
cursor:pointer;
background:#0f0f0f;
font-size:13px;
}

.pay.active{
border:1px solid #ff9800;
color:#ff9800;
}

/* TOTAL */
.totalBox{
background:linear-gradient(145deg,#141414,#0f0f0f);
padding:18px;
border-radius:14px;
border:1px solid #222;
}

.total{
font-size:24px;
color:#ff9800;
font-weight:700;
margin-top:10px;
}

/* BUTTON */
.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#ff9800,#ffb347);
font-weight:700;
cursor:pointer;
margin-top:12px;
}

/* ===== MOBILE FIX DEFINITIVO ===== */
@media(max-width:768px){

.app{
display:block;
}

/* IMPORTANTE: no usar fixed */
.right{
position:relative;
height:auto;
margin-top:20px;
border-top:1px solid #222;
border-left:none;
}

.left{
padding:15px;
}

}

/* NAV */
.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:#111;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid rgba(255,255,255,.08);
z-index:999;
}

.nav-item{
background:none;
border:none;
color:#aaa;
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
gap:4px;
cursor:pointer;
}

.nav-item i{font-size:18px;}
.nav-item.active{color:#ff9800;}

.icon-wrapper{position:relative;}

.cart-badge{
position:absolute;
top:-6px;
right:-10px;
background:#ff9800;
color:black;
font-size:10px;
padding:2px 6px;
border-radius:50px;
font-weight:700;
}
@media(max-width:768px){

.app{
display:block;
}

/* LEFT con espacio real para el nav */
.left{
padding:15px;
padding-bottom:100px; /* 🔥 CLAVE */
}

/* RIGHT sin fixed ni nada raro */
.right{
position:relative;
height:auto;
margin-top:20px;
border-top:1px solid #222;
border-left:none;
}

/* 🔥 NAV bien controlado */
.bottom-nav{
height:70px;
padding-bottom:env(safe-area-inset-bottom);
}

/* 🔥 evita que el contenido quede detrás */
body{
padding-bottom:90px;
}

}


/* HEADER */
header{
display:flex;
justify-content:center;
align-items:center;
padding:18px 8%;
background:rgba(20,20,20,.9);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:1000;
border-bottom:1px solid rgba(255,255,255,.05);
text-align:center;
}
.logo{
font-size:28px;
font-weight:800;
color:#ff9800;
}

nav{
display:flex;
gap:30px;
}

nav a{
color:#bbb;
text-decoration:none;
font-weight:500;
transition:.3s;
}

nav a:hover{
color:#ff9800;
}
</style>
</head>

<body>

<header>
<div class="logo">🍔 Burguer House</div>


</header>
<div class="app">

<!-- LEFT -->
<div class="left">

<div class="header">
<h1> Mi Pedido</h1>
<button class="clear" onclick="clearCart()">Vaciar</button>
</div>

<div class="list" id="list"></div>

</div>

<!-- RIGHT -->
<div class="right">

<div class="box">
<div class="title"> Entrega</div>

<div class="option active" onclick="setDelivery(0,this)">
 Retiro <span>Gratis</span>
</div>

<div class="option" onclick="setDelivery(40,this)">
 Domicilio <span>C$40</span>
</div>
</div>

<div class="box">
<div class="title">💳 Pago</div>

<div class="payments">
<div class="pay active" onclick="setPay(this)">Efectivo</div>
<div class="pay" onclick="setPay(this)">Tarjeta</div>
<div class="pay" onclick="setPay(this)">Transfer</div>
</div>
</div>

<div class="totalBox">
<p>Subtotal: C$<span id="subtotal">0</span></p>
<p>Entrega: C$<span id="delivery">0</span></p>

<div class="total">
Total: $<span id="total">0</span>
</div>

<button class="btn" onclick="sendWhatsApp()">
Confirmar Pedido 📲
</button>
</div>

</div>

</div>

<nav class="bottom-nav">

<button class="nav-item" onclick="location.href='index.html'">
<i class="fa-solid fa-house"></i>
<span>Inicio</span>
</button>

<button class="nav-item active" onclick="location.href='menu.html'">
<i class="fa-solid fa-burger"></i>
<span>Menú</span>
</button>

<button class="nav-item" onclick="location.href='pedidos.html'">
<div class="icon-wrapper">
<i class="fa-solid fa-box"></i>
<span class="cart-badge" id="cartCount">0</span>
</div>
<span>Pedidos</span>
</button>

<button class="nav-item" onclick="location.href='promos.html'">
<i class="fa-solid fa-tags"></i>
<span>Promos</span>
</button>

</nav>
<script>let cart = JSON.parse(localStorage.getItem("carrito")) || [];
let delivery = 0;
let pay = "Efectivo";
let direccion = "";

/* ================= ALERTAS PRO ================= */
function alerta(msg, tipo="info"){

let colors={
info:"#ff9800",
success:"#4caf50",
error:"#f44336"
};

let toast=document.createElement("div");

toast.innerText=msg;

toast.style.position="fixed";
toast.style.top="20px";
toast.style.right="20px";
toast.style.background=colors[tipo] || "#ff9800";
toast.style.color="#000";
toast.style.padding="12px 16px";
toast.style.borderRadius="12px";
toast.style.fontWeight="bold";
toast.style.boxShadow="0 10px 25px rgba(0,0,0,.3)";
toast.style.zIndex="99999";
toast.style.transform="translateX(120%)";
toast.style.transition="0.3s ease";

document.body.appendChild(toast);

setTimeout(()=>toast.style.transform="translateX(0)",50);

setTimeout(()=>{
toast.style.transform="translateX(120%)";
setTimeout(()=>toast.remove(),300);
},2000);

}

/* ================= MODAL CONFIRMACIÓN ================= */
function confirmarAccion(mensaje, callback){

let overlay=document.createElement("div");

overlay.style.position="fixed";
overlay.style.top="0";
overlay.style.left="0";
overlay.style.right="0";
overlay.style.bottom="0";
overlay.style.background="rgba(0,0,0,.6)";
overlay.style.display="flex";
overlay.style.justifyContent="center";
overlay.style.alignItems="center";
overlay.style.zIndex="100000";

overlay.innerHTML=`
<div style="background:#111;padding:20px;border-radius:15px;text-align:center;width:280px;border:1px solid #333">

<p style="color:white;margin-bottom:15px;font-weight:600;">${mensaje}</p>

<button id="okBtn" style="padding:10px 15px;margin:5px;background:#4caf50;border:none;border-radius:10px;color:white;font-weight:bold;cursor:pointer;">Sí</button>

<button id="noBtn" style="padding:10px 15px;margin:5px;background:#f44336;border:none;border-radius:10px;color:white;font-weight:bold;cursor:pointer;">No</button>

</div>
`;

document.body.appendChild(overlay);

document.getElementById("okBtn").onclick=()=>{
callback();
overlay.remove();
};

document.getElementById("noBtn").onclick=()=>{
overlay.remove();
};

}/* ================= MODAL DIRECCIÓN ================= */
function pedirDireccion(callback){

let overlay=document.createElement("div");

overlay.style.position="fixed";
overlay.style.inset="0";
overlay.style.background="rgba(0,0,0,.75)";
overlay.style.display="flex";
overlay.style.justifyContent="center";
overlay.style.alignItems="center";
overlay.style.zIndex="100000";

document.body.appendChild(overlay);

let direccionTemp="";
let telefonoTemp="";

mostrarDireccion();

/* ================= PASO 1 ================= */
function mostrarDireccion(){

overlay.innerHTML=`
<div style="
background:#111;
width:90%;
max-width:420px;
padding:25px;
border-radius:20px;
border:1px solid #333;
box-shadow:0 15px 40px rgba(0,0,0,.5);
">

<h3 style="color:#ff9800;text-align:center;margin-bottom:10px;">
📍 Dirección de Entrega
</h3>

<p style="color:#aaa;text-align:center;font-size:13px;margin-bottom:15px;">
Ingresa la dirección donde recibirás tu pedido
</p>

<textarea
id="direccionInput"
placeholder="Ej: Del parque 2 cuadras al norte..."
style="width:100%;height:100px;padding:12px;border:none;border-radius:12px;background:#1b1b1b;color:white;resize:none;"
>${direccionTemp}</textarea>

<div style="display:flex;gap:10px;margin-top:15px;">

<button id="cancelDir"
style="flex:1;padding:12px;border:none;border-radius:12px;background:#444;color:white;font-weight:bold;cursor:pointer;">
Cancelar
</button>

<button id="nextDir"
style="flex:1;padding:12px;border:none;border-radius:12px;background:#ff9800;color:black;font-weight:bold;cursor:pointer;">
Siguiente
</button>

</div>

</div>
`;

document.getElementById("cancelDir").onclick=()=>{
overlay.remove();
};

document.getElementById("nextDir").onclick=()=>{

direccionTemp=document.getElementById("direccionInput").value.trim();

if(!direccionTemp){
alerta("Ingresa una dirección","error");
return;
}

mostrarTelefono();

};

}

/* ================= PASO 2 ================= */
function mostrarTelefono(){

overlay.innerHTML=`
<div style="
background:#111;
width:90%;
max-width:420px;
padding:25px;
border-radius:20px;
border:1px solid #333;
box-shadow:0 15px 40px rgba(0,0,0,.5);
">

<h3 style="color:#ff9800;text-align:center;margin-bottom:10px;">
📞 Número de Teléfono
</h3>

<p style="color:#aaa;text-align:center;font-size:13px;margin-bottom:15px;">
Ingresa tu número de teléfono
</p>

<input
id="telefonoInput"
type="tel"
maxlength="8"
value="${telefonoTemp}"
placeholder="88888888"
style="width:100%;padding:12px;border:none;border-radius:12px;background:#1b1b1b;color:white;font-size:16px;"
>

<div style="display:flex;gap:10px;margin-top:15px;">

<button id="backDir"
style="flex:1;padding:12px;border:none;border-radius:12px;background:#444;color:white;font-weight:bold;cursor:pointer;">
Atrás
</button>

<button id="saveDir"
style="flex:1;padding:12px;border:none;border-radius:12px;background:#ff9800;color:black;font-weight:bold;cursor:pointer;">
Guardar
</button>

</div>

</div>
`;

const input=document.getElementById("telefonoInput");

input.oninput=()=>{
input.value=input.value.replace(/\D/g,"").slice(0,8);
};

document.getElementById("backDir").onclick=()=>{
telefonoTemp=input.value;
mostrarDireccion();
};

document.getElementById("saveDir").onclick=()=>{

telefonoTemp=input.value.trim();

if(telefonoTemp.length!==8){
alerta("El número debe tener 8 dígitos","error");
return;
}

overlay.remove();

callback({
direccion:direccionTemp,
telefono:telefonoTemp
});

};

}

}
/* ================= RENDER ================= */
function render(){

let html="";

cart.forEach((p,i)=>{

if(!p.qty) p.qty=1;
if(!p.extras) p.extras=[];

let extrasHTML="";

if(p.extras.length){
extrasHTML=`
<div style="font-size:12px;color:#aaa;margin-top:3px;">
Extras: ${p.extras.map(e=>e.nombre).join(", ")}
</div>`;
}

html+=`
<div class="item">
<img src="${p.img}">
<div class="info">
<div class="name">${p.nombre}</div>
${extrasHTML}
<div class="price">C$${p.precio.toLocaleString()}</div>
</div>

<div class="controls">
<div class="qty">
<button onclick="change(${i},-1)">-</button>
<span>${p.qty}</span>
<button onclick="change(${i},1)">+</button>
</div>
<button class="del" onclick="removeItem(${i})">🗑</button>
</div>
</div>`;
});

document.getElementById("list").innerHTML=html;
calc();
}

/* ================= CAMBIAR ================= */
function change(i,v){

cart[i].qty+=v;
if(cart[i].qty<1) cart[i].qty=1;

save();
render();
alerta("Cantidad actualizada ✔","info");
}

/* ================= ELIMINAR ================= */
function removeItem(i){

cart.splice(i,1);
save();
render();
alerta("Producto eliminado 🗑","error");
}

/* ================= VACIAR ================= */
function clearCart(){

if(cart.length===0){
alerta("El carrito ya está vacío","error");
return;
}

confirmarAccion("¿Vaciar carrito completo?",()=>{
cart=[];
save();
render();
alerta("Carrito vaciado ✔","success");
});

}
/* ================= DELIVERY ================= */
function setDelivery(v,el){

delivery = v;

document.querySelectorAll(".option")
.forEach(o => o.classList.remove("active"));

el.classList.add("active");

if(v > 0){

pedirDireccion((datos)=>{

direccion = datos.direccion;
telefono = datos.telefono;

alerta("Dirección y teléfono agregados correctamente","success");

calc();

});

}else{

direccion = "";
telefono = "";

calc();

}

alerta("Entrega actualizada ✔","info");

}
/* ================= ALERTA TRANSFERENCIA ================= */
function mostrarCuentaBampro(){

let overlay=document.createElement("div");

overlay.style.position="fixed";
overlay.style.top="0";
overlay.style.left="0";
overlay.style.right="0";
overlay.style.bottom="0";
overlay.style.background="rgba(0,0,0,.75)";
overlay.style.display="flex";
overlay.style.justifyContent="center";
overlay.style.alignItems="center";
overlay.style.zIndex="100000";

overlay.innerHTML=`
<div style="
background:#111;
width:90%;
max-width:380px;
padding:25px;
border-radius:20px;
border:1px solid #333;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.5);
">

<h2 style="color:#ff9800;">🏦 Transferencia Bancaria</h2>

<p style="color:#fff;font-size:16px;font-weight:bold;">
La transferencia se realizará a una cuenta BAMPRO.
</p>

<p style="color:#aaa;font-size:13px;margin-top:15px;">
Al confirmar el pedido te enviaremos los datos de la cuenta por WhatsApp.
</p>

<button id="cerrarCuenta"
style="
margin-top:20px;
padding:12px 25px;
background:#ff9800;
color:#000;
font-weight:bold;
border:none;
border-radius:12px;
cursor:pointer;
">
Entendido
</button>

</div>
`;

document.body.appendChild(overlay);

document.getElementById("cerrarCuenta").onclick=()=>{
overlay.remove();
};

}

/* ================= PAGO ================= */
function setPay(el){

pay=el.innerText;

document.querySelectorAll(".pay")
.forEach(p=>p.classList.remove("active"));

el.classList.add("active");

if(pay.toLowerCase().includes("transfer")){
mostrarCuentaBampro();
}

alerta("Método de pago seleccionado ✔","info");

}

/* ================= CALCULAR ================= */
function calc(){

let subtotal=0;

cart.forEach(p=>{
subtotal+=p.precio*p.qty;
});

document.getElementById("subtotal").innerText="C$"+subtotal.toLocaleString();
document.getElementById("delivery").innerText=delivery===0?"Gratis":"C$"+delivery.toLocaleString();
document.getElementById("total").innerText="C$"+(subtotal+delivery).toLocaleString();

}

/* ================= GUARDAR ================= */
function save(){
localStorage.setItem("carrito",JSON.stringify(cart));
}
/* ================= WHATSAPP ================= */
function sendWhatsApp(){

if(cart.length===0){
alerta("El carrito está vacío","error");
return;
}

if(delivery>0 && (!direccion || !telefono)){

pedirDireccion((datos)=>{

direccion = datos.direccion;
telefono = datos.telefono;

sendWhatsApp();

});

return;
}

const now=new Date();

const fecha=`${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()}`;

const hora=now.toLocaleTimeString('es-NI',{
hour:'2-digit',
minute:'2-digit',
hour12:true
});

let mensaje=`🍔 *BURGUER HOUSE*%0A`;
mensaje+=`--------------------------------%0A`;
mensaje+=`📅 Fecha: ${fecha}%0A`;
mensaje+=`⏰ Hora : ${hora}%0A`;
mensaje+=`--------------------------------%0A`;
mensaje+=`🛒 *PRODUCTOS*%0A`;

let subtotal=0;

cart.forEach(item=>{

let extrasText=item.extras?.length
?` (${item.extras.map(e=>e.nombre).join(", ")})`
:"";

let totalItem=item.precio*item.qty;

mensaje+=`• ${item.nombre}${extrasText} x${item.qty} = C$${totalItem}%0A`;

subtotal+=totalItem;

});

let total=subtotal+delivery;

mensaje+=`--------------------------------%0A`;
mensaje+=`💰 Subtotal: C$${subtotal}%0A`;
mensaje+=`🚚 Entrega : C$${delivery}%0A`;

if(delivery>0){
mensaje+=`📍 Dirección: ${direccion}%0A`;
mensaje+=`📞 Teléfono: ${telefono}%0A`;
}

mensaje+=`--------------------------------%0A`;
mensaje+=`🔥 TOTAL : C$${total}%0A`;
mensaje+=`💳 Pago : ${pay}%0A`;
mensaje+=`--------------------------------%0A%0A`;
mensaje+=`📩 Confirmo mi pedido. Gracias.`;

window.open(
`https://wa.me/50586982394?text=${mensaje}`,
"_blank"
);

}

/* ================= INIT ================= */
render();
</script>
</body>
</html>
